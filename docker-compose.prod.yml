# Production/dev-server stack: app + MongoDB + Caddy (auto-HTTPS reverse proxy).
# GNS3 is intentionally NOT wired here — the app runs fine without it; only the
# lab pages need it. Add GNS3 on this same VM later (nested virt is enabled) and
# point GNS3_HOST at it when you want labs live.
#
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/pingable-dev
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "3000" # internal only — Caddy fronts it, no host port published

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 12

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data # persists issued TLS certs across restarts
      - caddy-config:/config
    depends_on:
      - app

volumes:
  mongo-data:
  caddy-data:
  caddy-config:
